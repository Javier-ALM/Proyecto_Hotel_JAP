version: 2

models:
  # =========================================================
  # MART: OCUPACIÓN DIARIA (Revenue & Inventory)
  # =========================================================
  - name: mart_ocupacion_diaria
    description: "Análisis de ocupación real noche a noche, capacidad total y porcentaje de ocupación por hotel."
    config:
      contract:
        enforced: true
    columns:
      - name: fecha
        data_type: date
        description: "Día del calendario"
      - name: nombre_hotel
        data_type: varchar
      - name: ciudad
        data_type: varchar
      - name: estrellas
        data_type: integer
      - name: habitaciones_ocupadas
        data_type: integer
        description: "Total de habitaciones con huéspedes esa noche física."
      - name: capacidad_total
        data_type: integer
        description: "Total de habitaciones físicas disponibles en el hotel."
      - name: porcentaje_ocupacion
        data_type: number
        description: "KPI de ocupación (Habitaciones Ocupadas / Capacidad Total) * 100"

  # =========================================================
  # MART: CLIENTES FIDELIZACIÓN (Customer 360)
  # =========================================================
  - name: mart_clientes_fidelizacion
    description: "Vista integral del cliente con métricas de valor histórico (LTV), recencia y segmentación RFM."
    columns:
      - name: id_cliente
        description: "ID único del cliente (PK)"
        data_type: integer
        data_tests:
          - unique
          - not_null

      - name: nombre_completo
        data_type: varchar

      - name: nacionalidad
        data_type: varchar

      - name: num_estancias
        description: "Cantidad total de reservas finalizadas con éxito"
        data_type: integer

      - name: total_invertido
        description: "Suma total de pagos realizados (Lifetime Value)"
        data_type: number

      - name: recencia_dias
        description: "Días transcurridos desde la última estancia finalizada"
        data_type: integer

      - name: segmento_cliente
        description: "Segmentación basada en gasto y frescura de la visita."
        data_type: varchar
        data_tests:
          - accepted_values:
              arguments:
                values: ['VIP Activo', 'VIP en Riesgo', 'Recurrente', 'Ocasional']

  # =========================================================
  # MART: RENTABILIDAD DE SERVICIOS
  # =========================================================
  - name: mart_rentabilidad_servicios
    description: >
      Este modelo analiza los ingresos accesorios (Ancillary Revenue) generados por servicios 
      adicionales al alojamiento (Spa, Restaurante, Parking, etc.). 
      Permite identificar qué servicios son más populares y rentables según el perfil del hotel.
    config:
      contract:
        enforced: true
    columns:
      - name: nombre_hotel
        data_type: varchar
        description: "Nombre comercial del establecimiento donde se registró el consumo."

      - name: ciudad
        data_type: varchar
        description: "Ubicación geográfica del hotel."

      - name: estrellas
        data_type: integer
        description: "Categoría oficial del hotel (1-5 estrellas)."

      - name: nombre_servicio
        data_type: varchar
        description: "Nombre específico del servicio extra (ej. Masaje Deportivo, Cena Gourmet)."

      - name: categoria_servicio
        data_type: varchar
        description: "Agrupación lógica del servicio (ej. Alimentos y Bebidas, Bienestar, Transporte)."

      - name: veces_consumido
        data_type: integer
        description: "Volumen total de solicitudes o usos de este servicio."

      - name: ingresos_totales
        data_type: number
        description: "Suma total de la facturación bruta generada por el servicio (sin deducir costes)."

      - name: ticket_promedio
        data_type: number
        description: "Gasto medio por cada consumo realizado (Ingresos Totales / Veces Consumido)."


  # =========================================================
  # MART: RENTABILIDAD EJECUTIVA
  # =========================================================
  - name: mart_rentabilidad_ejecutiva
    description: "Análisis de rentabilidad por hotel, mes y canal. Incluye cálculo de beneficio neto y margen operativo."
    columns:
      - name: nombre_hotel
        data_type: varchar
        data_tests:
          - not_null
      - name: beneficio_neto
        description: "Ingresos totales menos costes operativos estimados."
        data_type: number
      - name: margen_lucro_pct
        description: "Porcentaje de beneficio sobre el ingreso total."
        data_type: number