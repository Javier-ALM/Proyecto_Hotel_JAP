version: 2

models:
#=======================================================
#                    fct_reservas
#=======================================================
  - name: fct_reservas
    description: "Tabla de hechos de reservas con seguimiento de insercion y actualizacion"
    config:
      contract:
        enforced: true
    columns:
      - name: id_reserva
        description: "ID unico de la reserva (PK)"
        data_type: integer
        data_tests:
          - unique
          - not_null
      - name: id_cliente
        description: "ID del cliente (FK) - relación con DIM_CLIENTES"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_clientes')
              field: id_cliente
      - name: id_hotel
        description: "ID del hotel (FK) - Relacion con DIM_HOTELES"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_hoteles')
              field: id_hotel
      - name: id_habitacion
        description: "ID de la habitacion (FK) - Relacion con DIM_HABITACIONES"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_habitaciones')
              field: id_habitacion
      - name: canal_reserva
        description: "Canal de origen de la reserva (Online, Directo, Agencia)"
        data_type: varchar
      - name: fecha_checkin
        description: "Fecha programada de entrada al hotel"
        data_type: date
        data_tests:
          - not_null
      - name: fecha_checkout
        description: "Fecha programada de salida del hotel"
        data_type: date
        data_tests:
          - not_null
      - name: numero_huespedes
        description: "Cantidad total de personas incluidas en la reserva"
        data_type: integer
        data_tests:
          - not_null
      - name: estado_reserva
        description: "Estado actual de la reserva (CONFIRMADA, CANCELADA, etc.)"
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CONFIRMADA', 'CANCELADA', 'CHECK-IN', 'CHECK-OUT', 'FINALIZADA', 'PENDIENTE']
      - name: noches_estancia
        description: "Diferencia de dias calculada entre checkout y checkin"
        data_type: integer
        data_tests:
          - not_null
      - name: _dbt_inserted_at
        description: "Fecha de cuando el registro fue insertado por PRIMERA VEZ (NUNCA cambia en cargas incrementales)"
        data_type: timestamp_ltz
        data_tests:
          - not_null
      - name: _dbt_updated_at
        description: "Fecha de la ULTIMA ACTUALIZACION del registro (cambia en cada carga incremental)"
        data_type: timestamp_ltz
        data_tests:
          - not_null

#=======================================================
#                    fct_consumos
#=======================================================
  - name: fct_consumos
    description: "Tabla de hechos que registra cada gasto/servicio consumido durante las estancias"
    config:
      contract:
        enforced: true
    columns:
      - name: id_consumo
        description: "ID unico del registro consumo (PK)"
        data_type: integer
        data_tests:
          - unique
          - not_null
      - name: id_reserva
        description: "ID de la reserva (FK) - Asegura que el consumo pertenece a una estancia valida"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_reservas')
              field: id_reserva
      - name: id_servicio
        description: "ID del servicio (FK) - Relacion con DIM_SERVICIO"
        data_type: integer
      - name: fecha_consumo
        description: "Fecha en la que se realizo el consumo"
        data_type: date
      - name: cantidad
        description: "Unidades o volumen del servicio consumido"
        data_type: number
      - name: importe_consumo
        description: "Monto economico total del consumo (Subtotal)"
        data_type: number
      - name: _dbt_updated_at
        description: "Fecha de carga/actualizacion del registro en la capa Gold"
        data_type: timestamp_ltz

#=======================================================
#                    fct_pagos
#=======================================================
  - name: fct_pagos
    description: "Tabla de hechos de transacciones de pago asociadas a reservas"
    config:
      contract:
        enforced: true
    columns:
      - name: id_pago
        description: "ID unico del pago (PK)"
        data_type: integer
        data_tests:
          - unique
          - not_null
      - name: id_reserva
        description: "ID de la reserva (FK)"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              to: ref('fct_reservas')
              field: id_reserva
      - name: fecha_pago
        description: "Fecha en la que se proceso el pago"
        data_type: date
      - name: monto_total
        description: "Importe total abonado en la transaccion"
        data_type: number
      - name: forma_pago
        description: "Metodo utilizado (Efectivo, Tarjeta, Transferencia)"
        data_type: varchar
      - name: estado_pago
        description: "Estado de la transaccion (Completado, Pendiente, Reembolsado)"
        data_type: varchar
      - name: referencia_pago
        description: "Codigo de autorizacion o ticket de pago"
        data_type: varchar
      - name: _dbt_updated_at
        description: "Fecha de carga/actualizacion del registro en la capa Gold"
        data_type: timestamp_ltz