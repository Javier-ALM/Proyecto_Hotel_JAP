version: 2

models:
  # =========================================================
  # DIMENSIÓN CLIENTES
  # =========================================================
  - name: dim_clientes
    description: "Maestra de clientes con limpieza de nombres y normalización de nacionalidad vía Seed."
    columns:
      - name: id_cliente
        data_type: integer
        data_tests:
          - unique    # TEST 1
          - not_null  # TEST 2
      - name: nombre_completo
        data_type: varchar
      - name: dni_pasaporte
        data_type: varchar
      - name: email
        data_type: varchar
      - name: telefono
        data_type: varchar
      - name: direccion
        data_type: varchar
      - name: fecha_registro
        data_type: date
      - name: dias_desde_registro
        data_type: integer
      - name: nacionalidad
        data_type: varchar
      - name: codigo_pais_iso2
        data_type: varchar
      - name: codigo_pais_iso3
        data_type: varchar
        data_tests:
          - relationships:    # TEST 3
              arguments: 
                to: ref('paises_iso')
                field: iso_alfa_3
      - name: _dbt_updated_at
        data_type: timestamp_ltz

  # =========================================================
  # DIMENSIÓN HOTELES
  # =========================================================
  - name: dim_hoteles
    description: "Maestra de hoteles con enriquecimiento de país y segmentación de negocio."
    columns:
      - name: id_hotel
        data_type: integer
        data_tests:
          - unique    # TEST 1
          - not_null  # TEST 2
      - name: nombre_hotel
        data_type: varchar
      - name: direccion
        data_type: varchar
      - name: ciudad
        data_type: varchar
      - name: pais_nombre
        data_type: varchar
      - name: pais_codigo_iso3
        data_type: varchar
        data_tests:
          - relationships:    #TEST 3
              arguments: 
                to: ref('paises_iso')
                field: iso_alfa_3
      - name: telefono
        data_type: varchar
      - name: email
        data_type: varchar
      - name: fecha_creacion
        data_type: date
      - name: es_activo
        data_type: boolean
      - name: estrellas
        data_type: integer
      - name: segmento_hotel
        description: "Clasificación comercial del hotel basada en sus estrellas."
        data_type: varchar
        data_tests:
          - accepted_values:    # TEST 4
              arguments: 
                values: ['Lujo', 'Estandar', 'Economico']
      - name: anios_operativo
        data_type: integer
      - name: _dbt_updated_at
        data_type: timestamp_ntz

  # =========================================================
  # DIMENSIÓN TIEMPO
  # =========================================================
  - name: dim_tiempo
    description: "Tabla de calendario dinámica generada por dbt."
    config:
      contract:
        enforced: true
    columns:
      - name: fecha
        data_type: date
        data_tests:
          - unique    # TEST 1
          - not_null  # TEST 2
      - name: anio
        data_type: integer
      - name: mes
        data_type: integer
      - name: nombre_mes
        data_type: varchar
      - name: dia
        data_type: integer
      - name: dia_semana
        data_type: integer
      - name: nombre_dia
        data_type: varchar
      - name: trimestre
        data_type: integer
      - name: es_fin_de_semana
        data_type: boolean

  # =========================================================
  # DIMENSIÓN HABITACIONES
  # =========================================================
  - name: dim_habitaciones
    description: "Maestra de habitaciones con los 4 tests genéricos activos."
    config:
      contract:
        enforced: true
    columns:
      - name: id_habitacion
        data_type: integer
        data_tests:
          - unique    # TEST 1
          - not_null  # TEST 2

      - name: id_hotel
        data_type: integer
        data_tests:
          - not_null
          - relationships: # TEST 3
              arguments:
                to: ref('dim_hoteles')
                field: id_hotel

      - name: tipo_habitacion
        data_type: varchar
        data_tests:
          - accepted_values: # TEST 4
              arguments:
                values: ['SUITE', 'DOBLE', 'INDIVIDUAL', 'DELUXE']

      - name: categoria_precio
        data_type: varchar
        data_tests:
          - accepted_values:    # TEST 4
              arguments:
                values: ['PREMIUM', 'ECONOMICO', 'ESTANDAR']

      - name: _dbt_updated_at
        data_type: timestamp_ltz


# =========================================================
  # DIMENSIÓN SERVICIOS 
  # =========================================================
  - name: dim_servicio
    description: "Maestra de servicios con contrato enforced."
    config:
      contract:
        enforced: true
    columns:
      - name: id_servicio
        data_type: integer
        data_tests:
          - unique           # TEST 1
          - not_null         # TEST 2

      - name: nombre_servicio
        data_type: varchar
        data_tests:
          - not_null
          - relationships:   # TEST 3 (Hacia tu nuevo Seed)
              arguments:
                to: ref('servicios')
                field: nombre_servicio

      - name: categoria
        data_type: varchar
        data_tests:
          - not_null
          - relationships:   # TEST 3 (Hacia tu nuevo Seed)
              arguments:
                to: ref('servicios')
                field: categoria

      - name: descripcion
        data_type: varchar

      - name: precio_unitario
        data_type: integer

      - name: es_activo
        data_type: boolean

      - name: categoria_precio_servicio
        data_type: varchar
        data_tests:
          - accepted_values: # TEST 4
              arguments:
                values: ['PREMIUM', 'BASICO']

      - name: _dbt_updated_at
        data_type: timestamp_ltz