# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'Proyecto_Hotel_JAP'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# Paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Sesión Snowflake
on-run-start:
  - "ALTER SESSION SET TIMEZONE = 'Europe/Madrid'"

models:
  Proyecto_Hotel_JAP:

    # Capa silver
    silver:
      +database: "{{ env_var('DBT_DATABASE_SILVER', 'HOTEL_DEV_SILVER_DB') }}"  
      +schema: SILVER
      +materialized: view
      staging:
        +materialized: view

    # Capa gold
    gold:
      +database: "{{ env_var('DBT_DATABASE_GOLD', 'HOTEL_DEV_GOLD_DB') }}"      
      #+schema: GOLD              #PONER / QUITAR
      +materialized: table

      dimensiones:
        +schema: DIMENSIONES     #PONER / QUITAR
        +tags: ["dimension"]

      hechos:
        +schema: HECHOS          #PONER / QUITAR
        +tags: ["fact"]

      mart: 
        +schema: MARTS
        +tags: ["casos_negocio"]

seeds: 
  Proyecto_Hotel_JAP:
    +database: "{{ env_var('DBT_DATABASE_BRONZE', 'HOTEL_DEV_BRONZE_DB') }}"   
    +schema: BRONZE

snapshots: 
  Proyecto_Hotel_JAP:
    +database: "{{ env_var('DBT_DATABASE_GOLD', 'HOTEL_DEV_GOLD_DB') }}"   
    +schema: SNAPSHOTS